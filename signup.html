<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Join Petly</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="description" content="Create your Petly account and join our pet care community.">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-alt);
            padding: 2rem 0;
        }
        .auth-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            position: relative;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-toggles {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            display: flex;
            gap: 0.75rem;
        }
        [dir="rtl"] .auth-toggles {
            right: auto;
            left: 1.5rem;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            width: 100%;
            padding: 1rem;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="auth-toggles">
        <button class="toggle-btn" id="rtl-toggle">RTL</button>
        <button class="toggle-btn" id="theme-toggle"><i data-lucide="moon"></i></button>
    </div>

    <div class="auth-card animate-fade">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                <i data-lucide="paw-print"></i>
                Petly
            </a>
            <div style="margin-bottom: 1.5rem;">
                <a href="index.html" style="font-size: 0.85rem; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.25rem;">
                    <i data-lucide="arrow-left" size="14"></i> Back to Home
                </a>
            </div>
            <h2 style="font-size: 1.75rem;">Create Your Account</h2>
            <p style="color: var(--text-muted);">Join our community today</p>
        </div>

        <form action="dashboard.html" method="GET">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="input-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" placeholder="Your name" style="width: 100%; padding: 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); font-family: inherit;" required>
                </div>
                <div class="input-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" placeholder="Family name" style="width: 100%; padding: 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); font-family: inherit;" required>
                </div>
            </div>
            
            <div class="input-group" style="margin-bottom: 1.5rem;">
                <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Email address</label>
                <input type="email" id="email" placeholder="example@email.com" style="width: 100%; padding: 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); font-family: inherit;" required>
            </div>

            <div class="input-group" style="margin-bottom: 1.5rem; position: relative;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Password</label>
                <input type="password" id="password" placeholder="••••••••" style="width: 100%; padding: 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); font-family: inherit;" required>
            </div>

            <div style="display: flex; gap: 0.5rem; margin-bottom: 2rem; font-size: 0.85rem; color: var(--text-muted);">
                <input type="checkbox" required>
                <span>I agree to the <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a>.</span>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.1rem; font-size: 1.1rem;">Create Account</button>
        </form>

        <div class="divider" style="display: flex; align-items: center; text-align: center; margin: 2rem 0; color: var(--text-muted); font-size: 0.9rem;">
            <span style="flex: 1; border-bottom: 1px solid var(--border); margin-right: 1rem;"></span>
            or join with
            <span style="flex: 1; border-bottom: 1px solid var(--border); margin-left: 1rem;"></span>
        </div>

        <button class="social-btn"><i data-lucide="chrome" size="20"></i> Google</button>
        <button class="social-btn"><i data-lucide="apple" size="20"></i> Apple</button>

        <div class="auth-footer" style="margin-top: 2rem; text-align: center; font-size: 0.95rem; color: var(--text-muted);">
            Already a member? <a href="login.html" style="color: var(--primary); font-weight: 700;">Log in</a>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
