<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Join Petly</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="description" content="Create your Petly account and join our pet care community.">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-alt);
            padding: 2rem 0;
        }
        .auth-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            position: relative;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-toggles {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            display: flex;
            gap: 0.75rem;
        }
        [dir="rtl"] .auth-toggles {
            right: auto;
            left: 1.5rem;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            width: 100%;
            padding: 1rem;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 1rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .social-btn:hover {
            background: var(--bg-main);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 15px 30px -10px rgba(79, 70, 229, 0.4);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid var(--border);
        }
        .divider::before { margin-right: 1rem; }
        .divider::after { margin-left: 1rem; }

        .social-login-row {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            margin-top: 1.5rem;
        }

        .social-icon-btn {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-main);
        }

        .social-icon-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-6px) scale(1.1);
            box-shadow: 0 12px 24px -10px rgba(79, 70, 229, 0.5);
        }

        .social-icon-btn svg {
            display: block;
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            .auth-card {
                padding: 2rem 1.5rem;
            }
            .name-grid {
                grid-template-columns: 1fr !important;
            }
            .social-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <div class="auth-toggles">
        <button class="toggle-btn" id="rtl-toggle">RTL</button>
        <button class="toggle-btn" id="theme-toggle"><i data-lucide="moon"></i></button>
    </div>

    <div class="auth-card animate-fade">
        <div class="auth-header">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                <i data-lucide="paw-print"></i>
                Petly
            </a>

            <h2 style="font-size: 1.75rem;">Create Your Account</h2>
            <p style="color: var(--text-muted);">Join our community today</p>
        </div>

        <form action="dashboard.html" method="GET">
            <div class="name-grid" style="display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="input-group">
                    <label for="fname" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">First Name</label>
                    <input type="text" id="fname" placeholder="Your name" style="width: 100%; padding: 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); font-family: inherit;" required>
                </div>
                <div class="input-group">
                    <label for="lname" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Last Name</label>
                    <input type="text" id="lname" placeholder="Family name" style="width: 100%; padding: 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); font-family: inherit;" required>
                </div>
            </div>
            
            <div class="input-group" style="margin-bottom: 1.5rem;">
                <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Email address</label>
                <input type="email" id="email" placeholder="example@email.com" style="width: 100%; padding: 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); font-family: inherit;" required>
            </div>

            <div class="input-group" style="margin-bottom: 1.5rem; position: relative;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Password</label>
                <input type="password" id="password" placeholder="••••••••" style="width: 100%; padding: 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); font-family: inherit;" required>
            </div>

            <div style="display: flex; gap: 0.5rem; margin-bottom: 2rem; font-size: 0.85rem; color: var(--text-muted);">
                <input type="checkbox" required style="margin-top: 0.2rem;">
                <span>I agree to the <a href="#" style="color: var(--primary); font-weight: 600;">Terms of Service</a> and <a href="#" style="color: var(--primary); font-weight: 600;">Privacy Policy</a>.</span>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.1rem; font-size: 1.1rem; border-radius: var(--radius); font-weight: 700;">Create Account</button>
        </form>

        <div class="divider">or join with</div>
        <div class="social-login-row">
            <button class="social-icon-btn" title="Google">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09zM12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23zM5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84zM12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
            </button>
            <button class="social-icon-btn" title="Facebook">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
            </button>
            <button class="social-icon-btn" title="Apple">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.82-.779.883-1.453 2.31-1.271 3.66 1.339.104 2.714-.638 3.558-1.65z"/>
                </svg>
            </button>
        </div>

        <div class="auth-footer" style="margin-top: 2rem; text-align: center; font-size: 0.95rem; color: var(--text-muted);">
            Already a member? <a href="login.html" style="color: var(--primary); font-weight: 700;">Log in</a>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
